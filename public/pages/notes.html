<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudenHub — Notes</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/notes.css"/>
</head>
<body>
  <div class="topbar">
    <div class="topbar-logo">🎓 StudenHub</div>
    <div class="topbar-right">
      <div class="user-badge"><div class="avatar" id="topbar-avatar">S</div><span class="user-name" id="topbar-name">Student</span></div>
      <button class="btn-logout" id="logout-btn">Logout</button>
    </div>
  </div>
  <div class="guest-banner" id="guest-banner">👤 Guest mode. <a onclick="window.location.href='../index.html'">Create a free account →</a></div>
  <div class="app-body">
    <aside class="sidebar">
      <div class="nav-label">Main</div>
      <a class="nav-item" data-page="dashboard" href="dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
      <a class="nav-item" data-page="planner" href="planner.html"><span class="nav-icon">📅</span> Study Planner</a>
      <a class="nav-item active" data-page="notes" href="notes.html"><span class="nav-icon">📝</span> Notes</a>
      <a class="nav-item" data-page="timetable" href="timetable.html"><span class="nav-icon">🕐</span> Timetable</a>
      <a class="nav-item" data-page="assignments" href="assignments.html"><span class="nav-icon">✅</span> Assignments</a>
      <div class="nav-label">Resources</div>
      <a class="nav-item" data-page="pyq" href="pyq.html"><span class="nav-icon">📄</span> PYQ</a>
      <a class="nav-item" data-page="model" href="model.html"><span class="nav-icon">📋</span> Model Papers</a>
      <div class="nav-label">Tools</div>
      <a class="nav-item" data-page="pomodoro" href="pomodoro.html"><span class="nav-icon">⏱️</span> Pomodoro</a>
      <a class="nav-item" data-page="flashcards" href="flashcards.html"><span class="nav-icon">🃏</span> Flashcards</a>
      <a class="nav-item" data-page="grades" href="grades.html"><span class="nav-icon">📈</span> Grades</a>
      <a class="nav-item" data-page="analytics" href="analytics.html"><span class="nav-icon">📉</span> Analytics</a>
    </aside>
    <main class="content">
      <div class="page-header">
        <div class="page-title">My <span>Notes</span></div>
      </div>
      <div class="note-editor">
        <input type="text" id="n-title" placeholder="Note title..." />
        <textarea id="n-body" placeholder="Start writing your notes here..."></textarea>
        <div class="note-toolbar">
          <select id="n-subject"><option value="">📚 Subject</option><option>Mathematics</option><option>Physics</option><option>Chemistry</option><option>Computer Science</option><option>English</option><option>Economics</option><option>Other</option></select>
          <select id="n-color"><option value="purple">🟣 Purple</option><option value="green">🟢 Green</option><option value="yellow">🟡 Yellow</option><option value="red">🔴 Red</option><option value="blue">🔵 Blue</option></select>
          <button class="note-save-btn" onclick="saveNote()">💾 Save Note</button>
        </div>
      </div>
      <div class="search-bar"><span>🔍</span><input type="text" id="notes-search" placeholder="Search notes..." oninput="renderNotes()"/></div>
      <div class="cards-grid" id="notes-list"></div>
    </main>
  </div>
  <div id="toast"></div>
  <script src="../js/api.js"></script>
  <script src="../js/notes.js"></script>
</body>
</html>
