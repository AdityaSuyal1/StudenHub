<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudenHub — Login</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <span class="logo-emoji">🎓</span>
      <h1>StudenHub</h1>
      <p>Your complete academic companion</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login"    onclick="switchTab('login')">Login</button>
      <button class="auth-tab"        id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login Form -->
    <div id="form-login">
      <div class="form-group" style="margin-bottom:14px">
        <label>Email</label>
        <input type="email" id="l-email" placeholder="you@college.edu" />
      </div>
      <div class="form-group" style="margin-bottom:18px">
        <label>Password</label>
        <input type="password" id="l-pass" placeholder="••••••••" />
      </div>
      <button class="btn-login" onclick="doLogin()">Sign In</button>
    </div>

    <!-- Register Form -->
    <div id="form-register" style="display:none">
      <div class="form-group" style="margin-bottom:14px">
        <label>Full Name</label>
        <input type="text" id="r-name" placeholder="e.g. Ramesh Kumar" />
      </div>
      <div class="form-group" style="margin-bottom:14px">
        <label>Email</label>
        <input type="email" id="r-email" placeholder="you@college.edu" />
      </div>
      <div class="form-group" style="margin-bottom:14px">
        <label>Course / Branch</label>
        <input type="text" id="r-course" placeholder="e.g. B.Tech CSE, BCA, MBA" />
      </div>
      <div class="form-group" style="margin-bottom:18px">
        <label>Password</label>
        <input type="password" id="r-pass" placeholder="Min 6 characters" />
      </div>
      <button class="btn-login" onclick="doRegister()">Create Account</button>
    </div>

    <div class="auth-divider"><span>or continue without signing up</span></div>
    <button class="btn-guest-login" onclick="doGuestLogin()">👤 Continue as Guest</button>

    <p id="auth-msg"></p>
  </div>
</div>

<div id="toast"></div>
<script src="./js/api.js"></script>
<script src="./js/login.js"></script>
</body>
</html>
